# Entorno de desarrollo local. Los valores aquí son seguros para dev;
# en producción todas las credenciales van por variables de entorno.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: peluqueria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -d peluqueria_db
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/peluqueria_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: clave-secreta-super-segura-para-desarrollo-local
      MAIL_ENABLED: "false"

volumes:
  pgdata:
