spring.application.name=peluqueria

# perfil activo por defecto (cambiar a "prod" en produccion)
spring.profiles.active=dev

# configuracion comun
# Cloud Run inyecta el puerto via la env var PORT; en local cae al 8080.
server.port=${PORT:8080}

# conexion a postgresql
# DB_URL se externaliza para produccion (Neon, con ?sslmode=require). En local
# (sin la variable) cae a la BD de desarrollo.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/peluqueria_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
# 4 horas (en milisegundos). Ventana corta para acotar el riesgo si se roba el token.
jwt.expiration=14400000

# Origenes permitidos para CORS (frontend admin en desarrollo)
cors.allowed-origins=http://localhost:4200

# Horario laboral de la peluqueria (L-S). Domingo cerrado.
peluqueria.horario.apertura=09:00
peluqueria.horario.cierre=20:00

# === Email / SMTP (notificaciones) ===
# Credenciales por env var (NUNCA hardcodear). Para Gmail: activar verificacion en 2 pasos
# y generar una App Password; MAIL_USERNAME = tu cuenta gmail, MAIL_PASSWORD = la App Password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remitente de los correos. Con Gmail debe coincidir con MAIL_USERNAME (Gmail reescribe otros).
peluqueria.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@lalosegovia.com}}
# Direccion del negocio que recibe los avisos de citas (reservada/modificada/anulada).
peluqueria.mail.negocio=${BUSINESS_EMAIL:edu92seg@gmail.com}
# Habilita/inhabilita el envio real (util para dev sin credenciales SMTP).
peluqueria.mail.enabled=${MAIL_ENABLED:true}
# URL base del frontend para enlaces en correos (ej. reset de password).
peluqueria.frontend-url=${FRONTEND_URL:http://localhost:4200}

# === Recuperacion de contrasena ===
# Minutos de validez del enlace de restablecimiento (token de un solo uso).
peluqueria.reset.expiracion-minutos=${RESET_EXPIRACION_MINUTOS:30}
# Rate limiting (por IP) de los endpoints publicos /api/auth/recuperar y /api/auth/reset:
# como maximo {capacidad} peticiones por cada ventana de {ventana-minutos}.
peluqueria.ratelimit.reset.capacidad=${RATELIMIT_RESET_CAPACIDAD:5}
peluqueria.ratelimit.reset.ventana-minutos=${RATELIMIT_RESET_VENTANA_MINUTOS:15}
