<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aviso de cita</title>
</head>
<body style="margin:0; padding:0; background-color:#121212; font-family:Arial, Helvetica, sans-serif; color:#e8e8e8;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#121212; padding:32px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#1e1e1e; border-radius:12px; overflow:hidden;">
                <tr>
                    <td style="background-color:#e07a5f; padding:28px 32px;">
                        <h1 style="margin:0; font-size:22px; color:#121212;">Lalo Segovia · Gestion</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h2 style="margin:0 0 16px; font-size:20px; color:#ffffff;">
                            Cita <span th:text="${accion}">reservada</span>
                        </h2>
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#262626; border-radius:8px; padding:8px 0;">
                            <tr>
                                <td style="padding:12px 20px; font-size:14px; color:#9a9a9a; width:120px;">Cliente</td>
                                <td style="padding:12px 20px; font-size:15px; color:#ffffff;" th:text="${cliente}">Nombre</td>
                            </tr>
                            <tr>
                                <td style="padding:12px 20px; font-size:14px; color:#9a9a9a; border-top:1px solid #333;">Servicio</td>
                                <td style="padding:12px 20px; font-size:15px; color:#ffffff; border-top:1px solid #333;" th:text="${servicio}">Corte</td>
                            </tr>
                            <tr>
                                <td style="padding:12px 20px; font-size:14px; color:#9a9a9a; border-top:1px solid #333;">Fecha</td>
                                <td style="padding:12px 20px; font-size:15px; color:#ffffff; border-top:1px solid #333;" th:text="${fecha}">fecha</td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 32px; border-top:1px solid #2c2c2c;">
                        <p style="margin:0; font-size:12px; color:#7a7a7a;">
                            Aviso automatico del sistema de reservas.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
