<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bienvenida</title>
</head>
<body style="margin:0; padding:0; background-color:#121212; font-family:Arial, Helvetica, sans-serif; color:#e8e8e8;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#121212; padding:32px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#1e1e1e; border-radius:12px; overflow:hidden;">
                <tr>
                    <td style="background-color:#e07a5f; padding:28px 32px;">
                        <h1 style="margin:0; font-size:22px; color:#121212;">Lalo Segovia</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h2 style="margin:0 0 16px; font-size:20px; color:#ffffff;">¡Te damos la bienvenida, <span th:text="${nombre}">cliente</span>!</h2>
                        <p style="margin:0 0 16px; font-size:15px; line-height:1.6; color:#c7c7c7;">
                            Tu cuenta se ha creado correctamente. Ya puedes reservar tus citas, consultarlas y
                            gestionar tu perfil desde la app.
                        </p>
                        <p style="margin:0; font-size:15px; line-height:1.6; color:#c7c7c7;">
                            Gracias por confiar en nosotros. ¡Nos vemos pronto!
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 32px; border-top:1px solid #2c2c2c;">
                        <p style="margin:0; font-size:12px; color:#7a7a7a;">
                            Este es un correo automatico, por favor no respondas a este mensaje.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
