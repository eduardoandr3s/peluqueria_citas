# Perfil de produccion

# Hibernate solo valida que las tablas coincidan con las entidades, no modifica la BD
spring.jpa.hibernate.ddl-auto=validate

# No imprimir queries SQL en consola
spring.jpa.show-sql=false

# Origenes permitidos para CORS (panel de administracion en produccion)
# Se externaliza a la env var CORS_ALLOWED_ORIGINS (varios origenes separados por coma).
# El valor tras los ':' es el fallback si la variable no esta definida.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://admin.tu-dominio.com}
